<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>KVideo 下载器</title>
<style>
body{font-family:sans-serif;max-width:600px;margin:30px auto;padding:20px;background:#111;color:#eee;border-radius:12px}
#s{background:#1a1a1a;padding:15px;border-radius:8px;white-space:pre;font-size:12px;height:450px;overflow-y:auto;line-height:1.6}
.btn{background:#6366f1;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:16px}
.btn:hover{background:#4f46e5}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#222;color:#eee;margin:10px 0;box-sizing:border-box}
.ok{color:#4ade80}
.xx{color:#f87171}
</style>
</head>
<body>
<h2>KVideo 下载器</h2>
<input id="urlInput" placeholder="m3u8 地址">
<button class="btn" onclick="start()">下载</button>
<div id="s">就绪</div>
<script>
const BASE = 'https://kvideo-8gw.pages.dev';
const S = id => document.getElementById(id);
const log = msg => { const el = S('s'); el.textContent += '\n' + msg; el.scrollTop = el.scrollHeight; };
const delay = ms => new Promise(r => setTimeout(r, ms));
const GOOD_SIZE = 1048576;

async function start() {
  let u = S('urlInput').value.trim() || new URL(location.href).searchParams.get('url');
  if (!u) return;
  S('s').textContent = '';
  const proxy = raw => BASE + '/api/proxy?url=' + encodeURIComponent(raw);
  try {
    log('获取 m3u8...');
    let res = await fetch(proxy(u));
    let text = await res.text();
    const segs = await getSegs(text, u, proxy);
    log('分片: ' + segs.length);
    await downloadAll(segs, proxy);
  } catch(e) { log('错误: ' + e.message); }
}

async function getSegs(text, baseUrl, proxy) {
  const lines = text.split(/\r?\n/);
  if (text.includes('EXT-X-STREAM-INF')) {
    let vs = [], bw = 0;
    for (const l of lines) {
      const t = l.trim();
      if (t.startsWith('#EXT-X-STREAM-INF:')) bw = parseInt(t.match(/BANDWIDTH=(\d+)/)?.[1] || '0');
      else if (bw > 0 && t && !t.startsWith('#')) { vs.push({bw, url: t.startsWith('http')?t:new URL(t,baseUrl)+''}); bw = 0; }
    }
    vs.sort((a,b) => b.bw - a.bw);
    log('画质: ' + vs[0].url);
    let r2 = await fetch(proxy(vs[0].url));
    let t2 = await r2.text();
    return t2.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#')).map(l => l.startsWith('http')?l:new URL(l,vs[0].url)+'');
  }
  return lines.filter(l => l.trim() && !l.startsWith('#')).map(l => l.startsWith('http')?l:new URL(l,baseUrl)+'');
}

function fmt(s) { return s < 1048576 ? (s/1024).toFixed(1)+'KB' : (s/1048576).toFixed(1)+'MB'; }

async function downloadAll(segs, proxy) {
  const total = segs.length;
  const bufs = new Array(total).fill(null);
  let bytes = 0;
  let pass = 0;
  let lastBad = -1;

  while (true) {
    pass++;
    const idxs = [];
    for (let i = 0; i < total; i++) {
      if (!bufs[i] || (bufs[i].byteLength > 0 && bufs[i].byteLength < GOOD_SIZE)) idxs.push(i);
    }
    if (idxs.length === 0) {
      log('全部正常!');
      break;
    }
    if (idxs.length === lastBad) {
      log('补了也没变化(' + idxs.length + '个始终补不好)，停止');
      break;
    }
    lastBad = idxs.length;

    if (pass > 1) { log('--- 第' + pass + '轮 剩余' + idxs.length + '个 ---'); await delay(2000); }

    for (let b = 0; b < idxs.length; b++) {
      const idx = idxs[b];
      const seq = b + 1;
      try {
        let sr;
        try { sr = await fetch(segs[idx], {signal:AbortSignal.timeout(5000)}); }
        catch(e) { sr = await fetch(proxy(segs[idx]), {signal:AbortSignal.timeout(30000)}); }
        const buf = await sr.arrayBuffer();
        if (sr.ok && buf.byteLength > 1000) {
          if (bufs[idx]) bytes -= bufs[idx].byteLength;
          bufs[idx] = buf;
          bytes += buf.byteLength;
          log((buf.byteLength >= GOOD_SIZE ? 'OK' : 'SM') + ' ' + seq + '/' + total + ' ' + fmt(buf.byteLength));
        } else {
          if (!bufs[idx]) bufs[idx] = new ArrayBuffer(0);
          log('XX ' + seq + '/' + total + ' ' + fmt(buf.byteLength));
        }
      } catch(e) {
        if (!bufs[idx]) bufs[idx] = new ArrayBuffer(0);
        log('XX ' + seq + '/' + total + ' err');
      }

      if (b < idxs.length - 1) await delay(1000);
      if (seq % 3 === 0 && b < idxs.length - 1) await delay(2500);
      if (seq % 102 === 0) await delay(10000);
    }
  }

  const ok = bufs.filter(b => b && b.byteLength >= GOOD_SIZE).length;
  const bad = bufs.filter(b => b && b.byteLength > 0 && b.byteLength < GOOD_SIZE).length;
  log('---\n正常: ' + ok + ' 截断: ' + bad + ' 总大小: ' + fmt(bytes));
  const blob = new Blob(bufs.filter(b => b && b.byteLength > 0), {type:'video/mp2t'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'video_' + Date.now() + '.ts';
  a.click();
  log('完成! ' + fmt(bytes));
}
</script>
</body>
</html>
