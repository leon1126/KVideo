<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>KVideo 下载器</title>
<style>
body{font-family:sans-serif;max-width:600px;margin:30px auto;padding:20px;background:#111;color:#eee;border-radius:12px}
#s{background:#1a1a1a;padding:12px;border-radius:8px;white-space:pre;font-size:12px;height:450px;overflow-y:auto;line-height:1.5}
.btn{background:#6366f1;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:16px}
.btn:hover{background:#4f46e5}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#222;color:#eee;margin:10px 0;box-sizing:border-box}
.ok{color:#4ade80}
.xx{color:#f87171}
.wait{color:#fbbf24}
</style>
</head>
<body>
<h2>📥 KVideo 下载器</h2>
<input id="urlInput" placeholder="粘贴 m3u8 地址...">
<button class="btn" onclick="start()">开始下载</button>
<div id="s">就绪，粘贴 m3u8 地址后点开始下载</div>
<script>
const BASE = 'https://kvideo-8gw.pages.dev';
const S = id => document.getElementById(id);
const log = (m, cls) => {
  const el = S('s');
  const d = document.createElement('div');
  d.textContent = m;
  if (cls) d.className = cls;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
};
const delay = ms => new Promise(r => setTimeout(r, ms));

async function start() {
  let u = S('urlInput').value.trim() || new URL(location.href).searchParams.get('url');
  if (!u) { alert('请粘贴 m3u8 地址'); return; }
  S('s').textContent = '';
  const proxy = raw => BASE + '/api/proxy?url=' + encodeURIComponent(raw);
  try {
    log('获取 m3u8...');
    let res = await fetch(proxy(u));
    let text = await res.text();
    const allSegs = await parseM3u8(text, u, proxy);
    log('分片数: ' + allSegs.length);
    log('逐个下载中，每片间隔0.5秒...', 'wait');
    await downloadAll(allSegs, proxy);
  } catch(e) { log('\n❌ 错误: ' + (e.message || e)); }
}

async function parseM3u8(text, baseUrl, proxy) {
  const lines = text.split(/\r?\n/);
  if (text.includes('EXT-X-STREAM-INF')) {
    let variants = [], bw = 0;
    for (const line of lines) {
      const t = line.trim();
      if (t.startsWith('#EXT-X-STREAM-INF:')) bw = parseInt(t.match(/BANDWIDTH=(\d+)/)?.[1] || '0');
      else if (bw > 0 && t && !t.startsWith('#')) { variants.push({ bw, url: t.startsWith('http') ? t : new URL(t, baseUrl).toString() }); bw = 0; }
    }
    variants.sort((a, b) => b.bw - a.bw);
    if (!variants.length) throw new Error('无可用视频流');
    log('画质: ' + variants[0].url);
    let r2 = await fetch(proxy(variants[0].url));
    let t2 = await r2.text();
    return t2.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#')).map(l => l.startsWith('http') ? l : new URL(l, variants[0].url).toString());
  }
  return lines.filter(l => l.trim() && !l.startsWith('#')).map(l => l.startsWith('http') ? l : new URL(l, baseUrl).toString());
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1048576).toFixed(1) + 'MB';
}

async function downloadAll(segs, proxy) {
  const bufs = [];
  let failed = [];
  const total = segs.length;
  let totalBytes = 0;

  for (let pass = 1; pass <= 3; pass++) {
    const indices = pass === 1 ? segs.map((_, i) => i) : [...failed];
    if (indices.length === 0) break;
    failed = [];

    if (pass > 1) {
      log('--- 第' + pass + '轮重试 ' + indices.length + '个 ---', 'wait');
      await delay(2000);
    }

    for (let b = 0; b < indices.length; b++) {
      const idx = indices[b];
      const seq = b + 1;
      try {
        let sr;
        try {
          sr = await fetch(segs[idx], { signal: AbortSignal.timeout(5000) });
        } catch(e) {
          sr = await fetch(proxy(segs[idx]), { signal: AbortSignal.timeout(30000) });
        }
        const buf = await sr.arrayBuffer();
        if (sr.ok && buf.byteLength > 1000) {
          bufs.push(buf);
          totalBytes += buf.byteLength;
          log('OK ' + seq + '/' + total + ' ' + fmtSize(buf.byteLength), 'ok');
        } else {
          failed.push(idx);
          log('XX ' + seq + '/' + total + ' ' + fmtSize(buf.byteLength), 'xx');
        }
      } catch(e) {
        failed.push(idx);
        log('XX ' + seq + '/' + total + ' err', 'xx');
      }

      // 每个分片间隔0.5秒
      if (b < indices.length - 1) {
        await delay(1000);
      // 每5个额外停3秒
      if (seq % 3 === 0 && b < indices.length - 1) {
        log('--- 长暂停3秒 ---', 'wait');
        await delay(2500);
      }
      }
    }
    log('→ 第' + pass + '轮: ' + (total - failed.length) + '/' + total + ' OK, 累计 ' + fmtSize(totalBytes), 'wait');
  }

  log('\n====== 下载报告 ======', 'wait');
  log('总分段: ' + total, 'wait');
  log('成功: ' + bufs.length, 'wait');
  log('失败: ' + failed.length, 'wait');
  log('总大小: ' + fmtSize(totalBytes), 'wait');

  if (bufs.length === 0) { log('❌ 没有成功下载任何分片', 'xx'); return; }

  log('\n拼接 ' + fmtSize(totalBytes) + '...');
  const blob = new Blob(bufs, { type: 'video/mp2t' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'video_' + Date.now() + '.ts';
  a.click();
  log('✅ 下载完成！', 'ok');
}

window.onload = () => { const u = new URL(location.href).searchParams.get('url'); if (u) { S('urlInput').value = u; start(); } };
</script>
</body>
</html>
