<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>KVideo 批量下载器</title>
<style>
body{font-family:sans-serif;max-width:700px;margin:30px auto;padding:20px;background:#111;color:#eee;border-radius:12px}
.btn{background:#6366f1;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:16px}
.btn:hover{background:#4f46e5}
input,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#222;color:#eee;margin:6px 0;box-sizing:border-box;font-family:inherit}
textarea{height:100px}
#s{background:#1a1a1a;padding:12px;border-radius:8px;font-size:12px;height:500px;overflow-y:auto;line-height:1.6}
.epLine{display:flex;gap:10px;padding:2px 0}
.epNum{color:#60a5fa;min-width:60px}
.epProg{color:#4ade80;min-width:120px}
.epSize{color:#fbbf24;min-width:80px}
.epDone{color:#4ade80}
.epErr{color:#f87171}
.wait{color:#fbbf24;margin:4px 0}
</style>
</head>
<body>
<h2>📥 KVideo 批量下载器</h2>
<textarea id="urlInput" placeholder="粘贴 m3u8 地址，每行一集"></textarea>
<button class="btn" onclick="start()">▶ 开始下载</button>
<div id="s">就绪，粘贴 m3u8 地址后点开始下载</div>
<script>
const BASE = 'https://kvideo-8gw.pages.dev';
const S = () => document.getElementById('s');
const delay = ms => new Promise(r => setTimeout(r, ms));

async function start() {
  const raw = document.getElementById('urlInput').value.trim();
  if (!raw) { alert('请粘贴 m3u8 地址'); return; }
  const urls = raw.split('\n').map(u => u.trim()).filter(u => u);
  S().textContent = '';

  const rows = urls.map((_, i) => {
    const row = document.createElement('div');
    row.className = 'epLine';
    row.innerHTML = '<span class="epNum">#' + String(i+1).padStart(2,'0') + '</span><span class="epProg">排队中</span><span class="epSize"></span>';
    S().appendChild(row);
    return row;
  });

  await Promise.all(urls.map((u, i) => downloadEpisode(u, i, urls.length, rows[i])));
  const done = document.createElement('div');
  done.innerHTML = '<b>🎉 全部下载完成！</b>';
  done.className = 'epDone';
  S().appendChild(done);
}

async function downloadEpisode(m3u8Url, ep, total, row) {
  const proxy = raw => BASE + '/api/proxy?url=' + encodeURIComponent(raw);
  const prog = () => row.querySelector('.epProg');
  const sz = () => row.querySelector('.epSize');

  try {
    prog().textContent = '解析中...';
    let res = await fetch(proxy(m3u8Url));
    let text = await res.text();

    const lines = text.split(/\r?\n/);
    let segs;
    if (text.includes('EXT-X-STREAM-INF')) {
      let variants = [], bw = 0;
      for (const line of lines) {
        const t = line.trim();
        if (t.startsWith('#EXT-X-STREAM-INF:')) bw = parseInt(t.match(/BANDWIDTH=(\d+)/)?.[1] || '0');
        else if (bw > 0 && t && !t.startsWith('#')) { variants.push({ bw, url: t.startsWith('http') ? t : new URL(t, m3u8Url).toString() }); bw = 0; }
      }
      variants.sort((a, b) => b.bw - a.bw);
      if (!variants.length) throw new Error('无可用视频流');
      let r2 = await fetch(proxy(variants[0].url));
      let t2 = await r2.text();
      segs = t2.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#')).map(l => l.startsWith('http') ? l : new URL(l, variants[0].url).toString());
    } else {
      segs = lines.filter(l => l.trim() && !l.startsWith('#')).map(l => l.startsWith('http') ? l : new URL(l, m3u8Url).toString());
    }

    const totalSegs = segs.length;
    prog().textContent = '0/' + totalSegs;
    const bufs = [];
    let failed = [];
    let totalBytes = 0;

    for (let pass = 1; pass <= 3; pass++) {
      const indices = pass === 1 ? segs.map((_, i) => i) : [...failed];
      if (indices.length === 0) break;
      failed = [];
      if (pass > 1) await delay(2000);

      for (let b = 0; b < indices.length; b++) {
        const idx = indices[b];
        const seq = b + 1;
        try {
          let sr;
          try { sr = await fetch(segs[idx], { signal: AbortSignal.timeout(5000) }); }
          catch(e) { sr = await fetch(proxy(segs[idx]), { signal: AbortSignal.timeout(30000) }); }
          const buf = await sr.arrayBuffer();
          if (sr.ok && buf.byteLength > 1000) {
            bufs.push(buf);
            totalBytes += buf.byteLength;
          } else {
            failed.push(idx);
          }
        } catch(e) {
          failed.push(idx);
        }
        prog().textContent = seq + '/' + totalSegs;
        sz().textContent = fmtSize(totalBytes);
        if (b < indices.length - 1) await delay(1000);
        if (seq % 3 === 0 && b < indices.length - 1) await delay(2500);
        if (seq % 100 === 0) await delay(10000);
      }
    }

    const blob = new Blob(bufs, { type: 'video/mp2t' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ep_' + String(ep+1).padStart(2,'0') + '.ts';
    a.click();
    prog().textContent = '✅ ' + bufs.length + '/' + totalSegs;
    row.querySelector('.epNum').textContent = '✅ #' + String(ep+1).padStart(2,'0');
  } catch(e) {
    prog().textContent = '❌ ' + (e.message || e);
    row.className = 'epLine epErr';
  }
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1048576).toFixed(1) + 'MB';
}
</script>
</body>
</html>
